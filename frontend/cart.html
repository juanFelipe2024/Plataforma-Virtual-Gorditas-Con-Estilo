<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito - Gorditas con Estilo</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <nav class="navbar">
        <div class="navbar-brand">Gorditas con Estilo</div>
        <div class="navbar-links">
            <span id="nav-usuario"></span>
            <a href="index.html" class="nav-link">Catálogo</a>
            <a href="#" id="nav-logout" class="nav-link">Cerrar sesión</a>
        </div>
    </nav>

    <main class="container">
        <h2 class="section-title">Mi carrito</h2>

        <div id="carrito-container">
            <div id="carrito-items"></div>

            <div id="carrito-resumen" class="carrito-resumen hidden">
                <p class="carrito-total">Total: <span id="carrito-total">$0</span></p>
                <button id="btn-confirmar" class="btn-primary">Confirmar compra</button>
            </div>
        </div>
    </main>

    <script src="js/cart.js"></script>
</body>
</html>
