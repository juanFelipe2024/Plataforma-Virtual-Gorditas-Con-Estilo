<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin - Gorditas con Estilo</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <nav class="navbar">
        <div class="navbar-brand">Gorditas con Estilo — Admin</div>
        <div class="navbar-links">
            <span id="nav-usuario"></span>
            <a href="#" id="nav-logout" class="nav-link">Cerrar sesión</a>
        </div>
    </nav>

    <main class="container">

        <!-- Sección agregar producto -->
        <h2 class="section-title">Agregar producto</h2>
        <div class="admin-form">
            <div id="error-message" class="error-message hidden"></div>
            <div id="success-message" class="success-message hidden"></div>

            <div class="form-row">
                <div class="form-group">
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" placeholder="Nombre del producto">
                </div>
                <div class="form-group">
                    <label for="precio">Precio</label>
                    <input type="number" id="precio" placeholder="Precio en pesos">
                </div>
            </div>

            <div class="form-group">
                <label for="descripcion">Descripción</label>
                <input type="text" id="descripcion" placeholder="Descripción del producto">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="categoria">Categoría</label>
                    <input type="text" id="categoria" placeholder="blusas, pantalones...">
                </div>
                <div class="form-group">
                    <label for="color">Color</label>
                    <input type="text" id="color" placeholder="Color de la prenda">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="tallas">Tallas</label>
                    <input type="text" id="tallas" placeholder="XL, 2XL, 3XL">
                </div>
                <div class="form-group">
                    <label for="stock">Stock</label>
                    <input type="number" id="stock" placeholder="Cantidad disponible">
                </div>
            </div>

            <div class="form-group">
                <label for="imagen">Imagen (URL)</label>
                <input type="text" id="imagen" placeholder="URL de la imagen">
            </div>

            <button id="btn-agregar" class="btn-primary">Agregar producto</button>
        </div>

        <!-- Sección pedidos -->
        <h2 class="section-title" style="margin-top: 48px">Pedidos recibidos</h2>
        <div id="pedidos-container"></div>

        <!-- Sección productos -->
        <h2 class="section-title" style="margin-top: 48px">Productos en catálogo</h2>
        <div id="productos-container"></div>

    </main>

    <script src="js/admin.js"></script>
</body>
</html>
